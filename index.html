<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Yonglin Li | Curriculum Vitae</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #f5f7fa;
      font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: #222;
    }

    .language-container {
      width: 90%;
      max-width: 620px;
      padding: 50px 40px;
      background-color: #ffffff;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 36px;
    }

    .subtitle {
      margin-bottom: 35px;
      color: #666;
      font-size: 18px;
    }

    .language-links {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .language-links a {
      display: inline-block;
      min-width: 170px;
      padding: 13px 25px;
      border: 2px solid #1f4e79;
      border-radius: 6px;
      color: #1f4e79;
      font-size: 18px;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .language-links a:hover {
      background-color: #1f4e79;
      color: #ffffff;
    }

    .footer {
      margin-top: 35px;
      color: #888;
      font-size: 14px;
    }

    @media (max-width: 600px) {
      .language-container {
        padding: 40px 20px;
      }

      h1 {
        font-size: 30px;
      }

      .language-links {
        flex-direction: column;
        align-items: center;
      }

      .language-links a {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <main class="language-container">
    <h1>Yonglin Li / 李勇霖</h1>

    <div class="subtitle">
      Curriculum Vitae / 个人简历
    </div>

    <div class="language-links">
      <a href="cv-en.html">English Version</a>
      <a href="cv-cn.html">中文版</a>
    </div>

    <div class="footer">
      School of Mathematics and Statistics, Wuhan University / 武汉大学
    </div>
  </main>

</body>
</html>
